<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <meta name="apple-mobile-web-app-title" content="待办清单" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="本地保存的待办清单：添加、完成、删除与统计。"
    />
    <title>Todo App - 待办清单</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <style>
      /* ========= 主题色与基础样式（浅蓝现代风） ========= */
      :root {
        --bg: #f4f8ff;
        --card: rgba(255, 255, 255, 0.86);
        --text: #0f172a;
        --muted: #64748b;
        --primary: #3b82f6; /* 主色：浅蓝 */
        --primary-600: #2563eb;
        --danger: #ef4444;
        --danger-600: #dc2626;
        --border: rgba(148, 163, 184, 0.35);
        --shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        --ring: 0 0 0 4px rgba(59, 130, 246, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(
            1200px 600px at 10% 0%,
            rgba(59, 130, 246, 0.22),
            transparent 55%
          ),
          radial-gradient(
            1000px 520px at 95% 10%,
            rgba(14, 165, 233, 0.18),
            transparent 52%
          ),
          var(--bg);
        min-height: 100svh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(16px, env(safe-area-inset-top, 0px))
          max(16px, env(safe-area-inset-right, 0px))
          max(20px, env(safe-area-inset-bottom, 0px))
          max(16px, env(safe-area-inset-left, 0px));
        -webkit-tap-highlight-color: rgba(59, 130, 246, 0.15);
      }

      .app {
        width: min(780px, 100%);
        max-width: 100%;
        border: 1px solid var(--border);
        background: var(--card);
        backdrop-filter: blur(10px);
        border-radius: 18px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      header {
        padding: 22px 22px 14px;
        border-bottom: 1px solid var(--border);
        display: grid;
        gap: 6px;
      }

      .title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .chip {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.7);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
      }

      .chip strong {
        color: var(--text);
        font-weight: 700;
      }

      main {
        padding: 18px 22px 22px;
      }

      /* ========= 输入区域 ========= */
      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: stretch;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .schedule-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field-label {
        font-size: 12px;
        color: var(--muted);
      }

      .field-full {
        grid-column: 1 / -1;
      }

      .input {
        width: 100%;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.7);
        border-radius: 12px;
        padding: 12px 12px;
        font-size: 14px;
        outline: none;
        transition: box-shadow 150ms ease, border-color 150ms ease,
          transform 150ms ease;
      }

      .input:focus {
        border-color: rgba(59, 130, 246, 0.6);
        box-shadow: var(--ring);
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 650;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease,
          background 120ms ease, border-color 120ms ease;
        user-select: none;
        touch-action: manipulation;
      }

      /* 按钮 hover 动效：轻微上浮 + 阴影 */
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
      }

      .btn:active {
        transform: translateY(0px);
        box-shadow: none;
      }

      .btn-primary {
        background: linear-gradient(180deg, var(--primary), var(--primary-600));
        color: white;
      }

      .btn-primary:hover {
        background: linear-gradient(180deg, #4f8ef8, var(--primary-600));
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.65);
        border-color: var(--border);
        color: var(--text);
      }

      .btn-danger {
        background: rgba(239, 68, 68, 0.12);
        color: var(--danger-600);
        border-color: rgba(239, 68, 68, 0.25);
      }

      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.16);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .filter {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        font-size: 12px;
        color: var(--muted);
        transition: background 120ms ease, transform 120ms ease,
          box-shadow 120ms ease, border-color 120ms ease, color 120ms ease;
        touch-action: manipulation;
      }

      .filter:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.1);
      }

      .filter[aria-pressed="true"] {
        color: white;
        background: linear-gradient(180deg, var(--primary), var(--primary-600));
        border-color: transparent;
      }

      /* ========= 列表区域 ========= */
      .list {
        list-style: none;
        margin: 16px 0 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      .item {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.72);
        border-radius: 14px;
        padding: 12px 12px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .item[data-due-bucket="today"][data-done="false"] {
        border-color: rgba(239, 68, 68, 0.28);
        background: rgba(254, 242, 242, 0.9);
      }

      .item[data-due-bucket="tomorrow"][data-done="false"] {
        border-color: rgba(245, 158, 11, 0.28);
        background: rgba(255, 251, 235, 0.9);
      }

      .item[data-due-bucket="dayAfter"][data-done="false"] {
        border-color: rgba(59, 130, 246, 0.26);
        background: rgba(239, 246, 255, 0.88);
      }

      .check {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 1px solid rgba(59, 130, 246, 0.5);
        background: rgba(59, 130, 246, 0.07);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease,
          border-color 120ms ease;
        touch-action: manipulation;
      }

      .check:hover {
        transform: scale(1.04);
        background: rgba(59, 130, 246, 0.12);
      }

      .check[data-checked="true"] {
        background: linear-gradient(180deg, var(--primary), var(--primary-600));
        border-color: transparent;
      }

      .check svg {
        width: 14px;
        height: 14px;
        opacity: 0;
        transform: scale(0.9);
        transition: opacity 120ms ease, transform 120ms ease;
        color: white;
      }

      .check[data-checked="true"] svg {
        opacity: 1;
        transform: scale(1);
      }

      .text {
        min-width: 0;
      }

      .todo-title {
        margin: 0;
        font-size: 14px;
        line-height: 1.35;
        word-break: break-word;
      }

      .meta {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .item[data-done="true"] .todo-title {
        text-decoration: line-through;
        color: rgba(15, 23, 42, 0.55);
      }

      .item[data-done="true"] {
        background: rgba(241, 245, 249, 0.7);
        border-color: rgba(148, 163, 184, 0.32);
      }

      .item[data-done="true"] .meta {
        color: rgba(100, 116, 139, 0.85);
      }

      .empty {
        margin-top: 14px;
        padding: 18px;
        border-radius: 14px;
        border: 1px dashed rgba(59, 130, 246, 0.35);
        color: var(--muted);
        background: rgba(59, 130, 246, 0.06);
        display: none;
      }

      .empty[aria-hidden="false"] {
        display: block;
      }

      footer {
        padding: 14px 22px 18px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      /* ========= 平板与手机：单列、触控与可读性 ========= */
      @media (max-width: 720px) {
        body {
          padding-top: max(12px, env(safe-area-inset-top, 0px));
          place-items: start center;
        }

        header {
          padding: 18px 16px 12px;
        }

        main {
          padding: 14px 16px 16px;
        }

        .app {
          border-radius: 14px;
        }

        .title {
          flex-direction: column;
          align-items: stretch;
        }

        .title .chip {
          align-self: flex-start;
        }

        h1 {
          font-size: clamp(1.15rem, 4.2vw, 1.35rem);
          line-height: 1.25;
        }

        .subtitle {
          font-size: 14px;
        }

        .stats {
          gap: 8px;
        }

        .chip {
          padding: 8px 12px;
          font-size: 13px;
          line-height: 1.35;
        }

        .row {
          gap: 12px;
        }

        .input-row {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .schedule-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .input {
          width: 100%;
          min-height: 48px;
          font-size: 16px;
          padding: 14px 14px;
        }

        select.input {
          appearance: none;
          -webkit-appearance: none;
          background-image: linear-gradient(45deg, transparent 50%, #94a3b8 50%),
            linear-gradient(135deg, #94a3b8 50%, transparent 50%);
          background-position: calc(100% - 18px) calc(50% - 3px),
            calc(100% - 12px) calc(50% - 3px);
          background-size: 6px 6px, 6px 6px;
          background-repeat: no-repeat;
          padding-right: 38px;
        }

        .btn {
          width: 100%;
          min-height: 48px;
          padding: 14px 16px;
          font-size: 16px;
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
          gap: 12px;
          margin-top: 14px;
        }

        .filters {
          width: 100%;
          gap: 10px;
        }

        .filter {
          flex: 1 1 calc(50% - 8px);
          min-width: 0;
          min-height: 44px;
          padding: 10px 12px;
          font-size: 14px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        #clearDone {
          width: 100%;
        }

        .list {
          gap: 12px;
        }

        .item {
          grid-template-columns: auto 1fr;
          grid-template-areas:
            "check text"
            "actions actions";
          padding: 14px 14px;
          gap: 12px 14px;
          align-items: start;
        }

        .item .check {
          grid-area: check;
        }

        .item .text {
          grid-area: text;
        }

        .item .actions {
          grid-area: actions;
          display: flex;
          justify-content: stretch;
        }

        .check {
          width: 44px;
          height: 44px;
          min-width: 44px;
          min-height: 44px;
          border-radius: 12px;
        }

        .check svg {
          width: 18px;
          height: 18px;
        }

        .todo-title {
          font-size: 16px;
          line-height: 1.45;
        }

        .meta {
          font-size: 13px;
          margin-top: 6px;
        }

        .actions .btn-danger {
          width: 100%;
          min-height: 48px;
        }

        .empty {
          font-size: 15px;
          line-height: 1.5;
          padding: 20px 16px;
        }

        footer {
          padding: 12px 16px max(14px, env(safe-area-inset-bottom, 0px));
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
          font-size: 13px;
          line-height: 1.45;
        }
      }

      @media (max-width: 720px) and (hover: hover) {
        .btn:hover {
          transform: translateY(-1px);
          box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
        }

        .filter:hover {
          transform: translateY(-1px);
          box-shadow: 0 10px 20px rgba(15, 23, 42, 0.1);
        }

        .check:hover {
          transform: scale(1.04);
          background: rgba(59, 130, 246, 0.12);
        }
      }

      @media (max-width: 380px) {
        .filters {
          flex-direction: column;
        }

        .filter {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" role="application" aria-label="待办清单 Todo App">
      <header>
        <div class="title">
          <h1>待办清单 Todo App</h1>
          <span class="chip" title="数据会保存到浏览器本地">
            本地保存：<strong>开启</strong>
          </span>
        </div>
        <p class="subtitle">
          支持：添加 / 时间与重复 / 标记完成 / 删除 / 统计数量（已完成与未完成）
        </p>
        <div class="stats" aria-label="统计信息">
          <span class="chip">未完成：<strong id="countActive">0</strong></span>
          <span class="chip">已完成：<strong id="countDone">0</strong></span>
          <span class="chip">总计：<strong id="countTotal">0</strong></span>
        </div>
      </header>

      <main>
        <form id="form" class="row" autocomplete="off">
          <div class="input-row">
            <input
              id="input"
              class="input"
              type="text"
              placeholder="输入一个待办事项，例如：学习 30 分钟"
              aria-label="待办输入框"
            />
            <button class="btn btn-primary" type="submit">添加</button>
          </div>
          <div class="schedule-grid" aria-label="时间与重复设置">
            <label class="field">
              <span class="field-label">日期</span>
              <input id="dueDate" class="input" type="date" aria-label="待办日期" />
            </label>
            <label class="field">
              <span class="field-label">时间（半小时）</span>
              <select id="dueTime" class="input" aria-label="待办时间"></select>
            </label>
            <label class="field">
              <span class="field-label">重复规则</span>
              <select id="repeatRule" class="input" aria-label="重复规则">
                <option value="none">不重复</option>
                <option value="weekly">每周重复</option>
                <option value="monthly">每月重复</option>
              </select>
            </label>
            <label class="field">
              <span class="field-label">重复截止日期</span>
              <input
                id="repeatUntil"
                class="input"
                type="date"
                aria-label="重复截止日期"
                disabled
              />
            </label>
          </div>
        </form>

        <div class="toolbar" aria-label="工具栏">
          <div class="filters" role="group" aria-label="筛选">
            <button class="filter" type="button" data-filter="near" aria-pressed="true">
              近三天
            </button>
            <button class="filter" type="button" data-filter="all" aria-pressed="false">
              全部事项
            </button>
            <button class="filter" type="button" data-filter="active" aria-pressed="false">
              仅未完成
            </button>
            <button class="filter" type="button" data-filter="done" aria-pressed="false">
              仅已完成
            </button>
          </div>
          <button id="clearDone" class="btn btn-ghost" type="button">
            清空已完成
          </button>
        </div>

        <div id="empty" class="empty" aria-hidden="false">
          还没有待办。先在上面输入一个目标吧。
        </div>

        <ul id="list" class="list" aria-label="待办列表"></ul>
      </main>

      <footer>
        <span>快捷键：在输入框按 Enter 添加</span>
        <span>提示：点击左侧勾选按钮可切换完成状态</span>
      </footer>
    </div>

    <script>
      const formEl = document.getElementById("form");
      const inputEl = document.getElementById("input");
      const dueDateEl = document.getElementById("dueDate");
      const dueTimeEl = document.getElementById("dueTime");
      const repeatRuleEl = document.getElementById("repeatRule");
      const repeatUntilEl = document.getElementById("repeatUntil");
      const listEl = document.getElementById("list");
      const emptyEl = document.getElementById("empty");
      const clearDoneEl = document.getElementById("clearDone");
      const countActiveEl = document.getElementById("countActive");
      const countDoneEl = document.getElementById("countDone");
      const countTotalEl = document.getElementById("countTotal");
      const filterButtons = Array.from(document.querySelectorAll(".filter"));

      const STORAGE_KEY = "todo_app_v1";

      let todos = loadTodos();
      /** @type {"near" | "all" | "active" | "done"} */
      let filter = "near";

      function uid() {
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      function pad2(num) {
        return String(num).padStart(2, "0");
      }

      function formatDate(ts) {
        const d = new Date(ts);
        return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      }

      function formatDateTime(ts) {
        const d = new Date(ts);
        return `${formatDate(ts)} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function parseDateTimeToTs(dateStr, timeStr) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const [hh, mm] = timeStr.split(":").map(Number);
        return new Date(y, m - 1, d, hh, mm, 0, 0).getTime();
      }

      function getTodayStart() {
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      }

      function roundToHalfHour(date) {
        const d = new Date(date.getTime());
        const mins = d.getMinutes();
        const rounded = mins <= 30 ? 30 : 60;
        if (rounded === 60) {
          d.setHours(d.getHours() + 1, 0, 0, 0);
        } else {
          d.setMinutes(30, 0, 0);
        }
        return d;
      }

      function buildTimeOptions() {
        const opts = [];
        for (let hour = 0; hour < 24; hour += 1) {
          for (const minute of [0, 30]) {
            const value = `${pad2(hour)}:${pad2(minute)}`;
            opts.push(`<option value="${value}">${value}</option>`);
          }
        }
        dueTimeEl.innerHTML = opts.join("");
      }

      function getRepeatLabel(rule) {
        if (rule === "weekly") return "每周重复";
        if (rule === "monthly") return "每月重复";
        return "不重复";
      }

      function advanceOccurrence(ts, rule) {
        const d = new Date(ts);
        if (rule === "weekly") {
          d.setDate(d.getDate() + 7);
        } else if (rule === "monthly") {
          d.setMonth(d.getMonth() + 1);
        }
        return d.getTime();
      }

      function getBaseDueTs(todo) {
        if (todo.dueDate && todo.dueTime) return parseDateTimeToTs(todo.dueDate, todo.dueTime);
        return todo.createdAt;
      }

      function getEffectiveDueTs(todo) {
        const base = getBaseDueTs(todo);
        if (todo.repeatRule === "none") return base;
        const now = Date.now();
        const untilTs = todo.repeatUntil ? parseDateTimeToTs(todo.repeatUntil, "23:59") : null;
        let current = base;
        while (current < now) {
          const next = advanceOccurrence(current, todo.repeatRule);
          if (untilTs !== null && next > untilTs) break;
          if (next <= current) break;
          current = next;
        }
        return current;
      }

      function getDueBucket(ts) {
        const today = getTodayStart();
        const oneDay = 24 * 60 * 60 * 1000;
        if (ts >= today && ts < today + oneDay) return "today";
        if (ts >= today + oneDay && ts < today + oneDay * 2) return "tomorrow";
        if (ts >= today + oneDay * 2 && ts < today + oneDay * 3) return "dayAfter";
        return "later";
      }

      function inNextThreeDays(ts) {
        const today = getTodayStart();
        return ts >= today && ts < today + 3 * 24 * 60 * 60 * 1000;
      }

      function saveTodos() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }

      function loadTodos() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed
            .filter((t) => t && typeof t.title === "string")
            .map((t) => {
              const createdAt = typeof t.createdAt === "number" ? t.createdAt : Date.now();
              const fallbackDate = formatDate(createdAt);
              const fallbackTime = `${pad2(new Date(createdAt).getHours())}:${pad2(
                Math.floor(new Date(createdAt).getMinutes() / 30) * 30
              )}`;
              const repeatRule = t.repeatRule === "weekly" || t.repeatRule === "monthly" ? t.repeatRule : "none";
              return {
                id: typeof t.id === "string" ? t.id : uid(),
                title: String(t.title),
                done: Boolean(t.done),
                createdAt,
                dueDate: typeof t.dueDate === "string" ? t.dueDate : fallbackDate,
                dueTime: typeof t.dueTime === "string" ? t.dueTime : fallbackTime,
                repeatRule,
                repeatUntil: typeof t.repeatUntil === "string" ? t.repeatUntil : "",
              };
            });
        } catch {
          return [];
        }
      }

      function getPreparedTodos() {
        return todos
          .map((todo) => {
            const effectiveDueTs = getEffectiveDueTs(todo);
            return {
              ...todo,
              effectiveDueTs,
              dueBucket: getDueBucket(effectiveDueTs),
            };
          })
          .sort((a, b) => {
            if (a.done !== b.done) return a.done ? 1 : -1;
            if (a.effectiveDueTs !== b.effectiveDueTs) return a.effectiveDueTs - b.effectiveDueTs;
            return b.createdAt - a.createdAt;
          });
      }

      function getVisibleTodos(prepared) {
        if (filter === "near") return prepared.filter((t) => inNextThreeDays(t.effectiveDueTs));
        if (filter === "active") return prepared.filter((t) => !t.done);
        if (filter === "done") return prepared.filter((t) => t.done);
        return prepared;
      }

      function updateStats() {
        const total = todos.length;
        const done = todos.filter((t) => t.done).length;
        const active = total - done;
        countTotalEl.textContent = String(total);
        countDoneEl.textContent = String(done);
        countActiveEl.textContent = String(active);
      }

      function setEmptyState(visibleCount) {
        emptyEl.setAttribute("aria-hidden", visibleCount === 0 ? "false" : "true");
      }

      function render() {
        const prepared = getPreparedTodos();
        const visible = getVisibleTodos(prepared);
        listEl.innerHTML = "";

        for (const todo of visible) {
          const li = document.createElement("li");
          li.className = "item";
          li.dataset.id = todo.id;
          li.dataset.done = todo.done ? "true" : "false";
          li.dataset.dueBucket = todo.dueBucket;

          const check = document.createElement("button");
          check.className = "check";
          check.type = "button";
          check.dataset.checked = todo.done ? "true" : "false";
          check.setAttribute("aria-label", todo.done ? "标记为未完成" : "标记为已完成");
          check.innerHTML =
            '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M16.5 6.2 8.7 14 3.5 8.8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

          const textWrap = document.createElement("div");
          textWrap.className = "text";
          const title = document.createElement("p");
          title.className = "todo-title";
          title.textContent = todo.title;

          const meta = document.createElement("p");
          meta.className = "meta";
          const bucketName =
            todo.dueBucket === "today"
              ? "今天"
              : todo.dueBucket === "tomorrow"
                ? "明天"
                : todo.dueBucket === "dayAfter"
                  ? "后天"
                  : "更晚";
          const repeatLabel = getRepeatLabel(todo.repeatRule);
          const untilText = todo.repeatUntil ? `，截止：${todo.repeatUntil}` : "";
          meta.textContent = `时间：${formatDateTime(todo.effectiveDueTs)}（${bucketName}）｜重复：${repeatLabel}${untilText}`;

          textWrap.appendChild(title);
          textWrap.appendChild(meta);

          const actions = document.createElement("div");
          actions.className = "actions";
          const del = document.createElement("button");
          del.className = "btn btn-danger";
          del.type = "button";
          del.textContent = "删除";
          del.setAttribute("aria-label", "删除该待办");
          actions.appendChild(del);

          li.appendChild(check);
          li.appendChild(textWrap);
          li.appendChild(actions);
          listEl.appendChild(li);
        }

        updateStats();
        setEmptyState(visible.length);
      }

      function addTodo() {
        const title = inputEl.value.trim();
        if (!title) return;
        if (!dueDateEl.value || !dueTimeEl.value) return;

        const repeatRule = repeatRuleEl.value;
        const repeatUntil = repeatRule === "none" ? "" : repeatUntilEl.value;

        todos.unshift({
          id: uid(),
          title,
          done: false,
          createdAt: Date.now(),
          dueDate: dueDateEl.value,
          dueTime: dueTimeEl.value,
          repeatRule,
          repeatUntil,
        });
        saveTodos();
        render();
      }

      function toggleTodo(id) {
        const idx = todos.findIndex((t) => t.id === id);
        if (idx === -1) return;
        todos[idx] = { ...todos[idx], done: !todos[idx].done };
        saveTodos();
        render();
      }

      function deleteTodo(id) {
        todos = todos.filter((t) => t.id !== id);
        saveTodos();
        render();
      }

      function clearDone() {
        todos = todos.filter((t) => !t.done);
        saveTodos();
        render();
      }

      function setFilter(next) {
        filter = next;
        for (const btn of filterButtons) {
          btn.setAttribute("aria-pressed", btn.dataset.filter === next ? "true" : "false");
        }
        render();
      }

      function syncRepeatUntilState() {
        const isRepeat = repeatRuleEl.value !== "none";
        repeatUntilEl.disabled = !isRepeat;
        if (!isRepeat) repeatUntilEl.value = "";
      }

      function initFormDefaults() {
        buildTimeOptions();
        const nextHalfHour = roundToHalfHour(new Date());
        dueDateEl.value = formatDate(nextHalfHour.getTime());
        dueTimeEl.value = `${pad2(nextHalfHour.getHours())}:${pad2(nextHalfHour.getMinutes())}`;
        syncRepeatUntilState();
      }

      formEl.addEventListener("submit", (e) => {
        e.preventDefault();
        addTodo();
        inputEl.value = "";
        inputEl.focus();
      });

      repeatRuleEl.addEventListener("change", syncRepeatUntilState);

      listEl.addEventListener("click", (e) => {
        const target = e.target;
        const li = target.closest?.(".item");
        if (!li) return;
        const id = li.dataset.id;
        if (target.closest?.(".check")) {
          toggleTodo(id);
          return;
        }
        if (target.closest?.(".btn-danger")) {
          deleteTodo(id);
        }
      });

      clearDoneEl.addEventListener("click", clearDone);

      for (const btn of filterButtons) {
        btn.addEventListener("click", () => setFilter(btn.dataset.filter));
      }

      initFormDefaults();
      render();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
